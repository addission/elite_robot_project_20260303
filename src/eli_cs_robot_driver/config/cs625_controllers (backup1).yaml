ros__parameters:
  update_rate: 125

  joint_state_broadcaster:
    type: joint_state_broadcaster/JointStateBroadcaster

  arm_controller:
    type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 125.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      shoulder_pan_joint: { trajectory: 0.2, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 0.2, goal: 0.1 }
      elbow_joint: { trajectory: 0.2, goal: 0.1 }
      wrist_1_joint: { trajectory: 0.2, goal: 0.1 }
      wrist_2_joint: { trajectory: 0.2, goal: 0.1 }
      wrist_3_joint: { trajectory: 0.2, goal: 0.1 }

  forward_position_controller:
    type: position_controllers/JointGroupPositionController
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

  forward_velocity_controller:
    type: velocity_controllers/JointGroupVelocityController
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    interface_name: velocity

  scaled_joint_trajectory_controller:
    type: eli_cs_controllers/ScaledJointTrajectoryController
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      shoulder_pan_joint: { trajectory: 0.9, goal: 0.1 }
      shoulder_lift_joint: { trajectory: 0.9, goal: 0.1 }
      elbow_joint: { trajectory: 0.9, goal: 0.1 }
      wrist_1_joint: { trajectory: 0.9, goal: 0.1 }
      wrist_2_joint: { trajectory: 0.9, goal: 0.1 }
      wrist_3_joint: { trajectory: 0.9, goal: 0.1 }
    speed_scaling_interface_name: speed_scaling/speed_scaling_factor

  force_torque_sensor_broadcaster:
    type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster
    sensor_name: cs_ft_sensor
    state_interface_names:
      - force.x
      - force.y
      - force.z
      - torque.x
      - torque.y
      - torque.z
    frame_id: my_end_effector_link
    topic_name: ft_data

  tcp_pose_broadcaster:
    type: pose_broadcaster/PoseBroadcaster
    frame_id: my_end_effector_link
    pose_name: tcp_pose
    tf:
      child_frame_id: my_end_effector_link_controller

  speed_scaling_state_broadcaster:
    type: eli_cs_controllers/SpeedScalingStateBroadcaster
    state_publish_rate: 100.0
    tf_prefix: ""

  io_and_status_controller:
    type: eli_cs_controllers/GPIOController

  freedrive_controller:
    type: eli_cs_controllers/FreedriveController
